  #     - redis_password
  #     - web_app_url
  #     - api_url
  #     - bot_token
  #   depends_on:
  #     - redis
  #     - api



volumes:
  postgres_data: 
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge


secrets:
  db_password:
    file: ./secrets/db_password.txt

  secret_key:
    file: ./secrets/secret_key.txt

  redis_password:
    file: ./secrets/redis_password.txt

  web_app_url:
    file: ./secrets/web_app_url.txt

  api_url:
    file: ./secrets/api_url.txt

  bot_token:
    file: ./secrets/bot_token.txt

