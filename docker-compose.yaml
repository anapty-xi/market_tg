services:
  api:
    build: ./backend/
    image: backend
    ports:
      - 8000:8000
    volumes:
      - ./backend:/backend
      - static_volume:/backend/staticfiles
      - media_volume:/backend/media  
    environment: 
      SECRET_KEY: /run/secrets/secret_key
      DB_PASSWORD: /run/secrets/db_password
    secrets: 
      - secret_key
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  bot:
    build: ./tg_bot
    image: bot
    volumes:
      - ./bot:/bot
      - media_volume:/bot/media:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network


  postgres:
    image: postgres:15-alpine
    container_name: postgres_service
    restart: always
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market_adm
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_adm -d market"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_interval: 10s
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro 
      - media_volume:/usr/share/nginx/html/media:ro
    depends_on:
      - api
    networks:
      - app-network

  

volumes:
  postgres_data: 
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge


secrets:
  db_password:
    file: ./secrets/db_password.txt

  secret_key:
    file: ./secrets/secret_key.txt

